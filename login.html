<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portal — 登录</title>
<style>
:root {
  --bg: #0d1117;
  --card-bg: #161b22;
  --card-border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --accent-online: #3fb950;
  --accent-offline: #f85149;
  --radius: 8px;
  --font-body: system-ui, -apple-system, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", "Cascadia Code", monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 40px;
  width: min(400px, 100% - 32px);
}

h1 {
  font-family: var(--font-mono);
  font-size: 20px;
  text-align: center;
  margin-bottom: 4px;
}

h1 .mark { color: var(--accent-online); }

.subtitle {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  text-align: center;
  margin-bottom: 28px;
}

.alert {
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 18px;
}

.alert-error {
  background: rgba(248,81,73,0.12);
  border: 1px solid var(--accent-offline);
  color: var(--accent-offline);
}

.alert-info {
  background: rgba(210,153,34,0.12);
  border: 1px solid #d29922;
  color: #d29922;
}

.form-group {
  margin-bottom: 16px;
}

label {
  display: block;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

input {
  width: 100%;
  padding: 10px 12px;
  font-size: 14px;
  background: var(--bg);
  border: 1px solid var(--card-border);
  border-radius: 6px;
  color: var(--text-primary);
  font-family: var(--font-body);
  transition: border-color 0.15s;
}

input:focus {
  outline: none;
  border-color: var(--accent-online);
}

.btn {
  width: 100%;
  padding: 12px;
  font-size: 14px;
  font-weight: 600;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: opacity 0.15s;
  min-height: 44px;
}

.btn:disabled { opacity: 0.6; cursor: not-allowed; }

.btn-primary {
  background: #238636;
  color: #fff;
}

.btn-primary:hover:not(:disabled) {
  background: #2ea043;
}

.hint {
  text-align: center;
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 20px;
}

.hint code {
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 4px;
}

@media (max-width: 640px) {
  .login-box { padding: 28px 20px; }
}
</style>
</head>
<body>

<div class="login-box">
  <h1><span class="mark">■</span> Portal</h1>
  <p class="subtitle">本地服务门户</p>

  <div id="alert"></div>

  <form id="login-form" method="POST" action="/login">
    <input type="hidden" name="csrf_token" value="" />

    <div class="form-group">
      <label for="username">用户名</label>
      <input type="text" id="username" name="username" required autocomplete="username" />
    </div>

    <div class="form-group">
      <label for="password">密码</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" minlength="4" />
    </div>

    <button type="submit" class="btn btn-primary">登 录</button>
  </form>

  <p class="hint">首次使用请运行 <code>./portal user add &lt;用户名&gt;</code></p>
</div>

<script>
function initCSRF() {
  fetch('/csrf')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      document.querySelector('input[name="csrf_token"]').value = d.token;
    })
    .catch(function() {});
}

var params = new URLSearchParams(window.location.search);
var reason = params.get('reason');
var alertEl = document.getElementById('alert');

if (reason === 'expired') {
  alertEl.innerHTML = '<div class="alert alert-info">会话已过期，请重新登录。</div>';
} else if (reason) {
  alertEl.innerHTML = '<div class="alert alert-error">请先登录。</div>';
}

initCSRF();

document.getElementById('login-form').addEventListener('submit', function(e) {
  var btn = this.querySelector('button');
  btn.disabled = true;
  btn.textContent = '登录中...';
});
</script>
</body>
</html>
